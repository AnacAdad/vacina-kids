<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Minhas Crianças</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="carregando" class="estado-vazio">
    <p>Carregando crianças...</p>
  </div>

  <ion-list *ngIf="!carregando && criancas.length > 0" lines="full">
    <ion-item
      *ngFor="let crianca of criancas"
      button
      detail="false"
      (click)="abrirDetalhe(crianca.id)"
      class="item-crianca"
    >
      <ion-avatar slot="start">
        <ion-icon name="person-circle-outline" color="primary"></ion-icon>
      </ion-avatar>

      <ion-label>
        <h2>{{ crianca.nome }}</h2>
        <p>{{ crianca.idadeFormatada }}</p>

        <ion-badge color="secondary" *ngIf="crianca.totalAtrasadas === 0">
          Em dia
        </ion-badge>
        <ion-badge color="warning" *ngIf="crianca.totalAtrasadas > 0">
          {{ crianca.totalAtrasadas }} vacina(s) atrasada(s)
        </ion-badge>
      </ion-label>

      <ion-icon name="chevron-forward-outline" slot="end" color="medium"></ion-icon>
    </ion-item>
  </ion-list>

  <div *ngIf="!carregando && criancas.length === 0" class="estado-vazio">
    <p>Nenhuma criança cadastrada ainda.</p>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="secondary" (click)="abrirModalNovaCrianca()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
